<svg width="480" height="320" viewBox="0 0 480 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wp-bg" x1="0" y1="0" x2="480" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F4FAFD"/>
      <stop offset="100%" stop-color="#DBE9F4"/>
    </linearGradient>
    <linearGradient id="wp-circle" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D8FC9"/>
      <stop offset="100%" stop-color="#135785"/>
    </linearGradient>
    <linearGradient id="wp-phone-body" x1="300" y1="50" x2="430" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6DC3ED"/>
      <stop offset="100%" stop-color="#1E7AC4"/>
    </linearGradient>
    <linearGradient id="wp-data" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E7AC4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#1E7AC4"/>
      <stop offset="100%" stop-color="#1E7AC4" stop-opacity="0"/>
    </linearGradient>
    <filter id="wp-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#123A5C" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="320" rx="16" fill="url(#wp-bg)"/>

  <!-- WordPress circle on left -->
  <g transform="translate(55 90)" filter="url(#wp-shadow)">
    <circle cx="60" cy="60" r="62" fill="white"/>
    <circle cx="60" cy="60" r="56" fill="url(#wp-circle)"/>
    <!-- W letter -->
    <path d="M 25 35 L 40 92 L 52 48 L 60 48 L 68 48 L 80 92 L 95 35"
          stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="60" y="112" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="white" text-anchor="middle">WORDPRESS</text>
  </g>

  <!-- Data flow connection in middle -->
  <g>
    <!-- Connection lines -->
    <path d="M 180 125 Q 220 125 260 125" stroke="url(#wp-data)" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="4 4"/>
    <path d="M 180 155 Q 220 155 260 155" stroke="url(#wp-data)" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="4 4"/>
    <path d="M 180 185 Q 220 185 260 185" stroke="url(#wp-data)" stroke-width="3" stroke-linecap="round" fill="none" stroke-dasharray="4 4"/>

    <!-- Data packets -->
    <g filter="url(#wp-shadow)">
      <rect x="200" y="115" width="40" height="20" rx="4" fill="white" stroke="#1E7AC4" stroke-width="1.5"/>
      <text x="220" y="129" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#1E7AC4" text-anchor="middle">POSTS</text>
    </g>
    <g filter="url(#wp-shadow)">
      <rect x="200" y="145" width="40" height="20" rx="4" fill="white" stroke="#1E7AC4" stroke-width="1.5"/>
      <text x="220" y="159" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#1E7AC4" text-anchor="middle">WOO</text>
    </g>
    <g filter="url(#wp-shadow)">
      <rect x="200" y="175" width="40" height="20" rx="4" fill="white" stroke="#1E7AC4" stroke-width="1.5"/>
      <text x="220" y="189" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#1E7AC4" text-anchor="middle">MEDIA</text>
    </g>
  </g>

  <!-- Phone on right -->
  <g transform="translate(280 45)" filter="url(#wp-shadow)">
    <rect x="0" y="0" width="135" height="220" rx="20" fill="#123A5C"/>
    <rect x="4" y="4" width="127" height="212" rx="16" fill="url(#wp-phone-body)"/>
    <rect x="57" y="9" width="20" height="2.5" rx="1.2" fill="#123A5C"/>

    <!-- App content on screen -->
    <rect x="12" y="22" width="111" height="24" rx="4" fill="white" fill-opacity="0.92"/>
    <circle cx="22" cy="34" r="5" fill="#1E7AC4"/>
    <rect x="32" y="28" width="60" height="3" rx="1" fill="#123A5C"/>
    <rect x="32" y="35" width="40" height="2" rx="1" fill="#7BA8C8"/>

    <rect x="12" y="52" width="111" height="50" rx="4" fill="white" fill-opacity="0.92"/>
    <rect x="18" y="58" width="40" height="38" rx="3" fill="#6DC3ED" fill-opacity="0.55"/>
    <rect x="62" y="60" width="56" height="3" rx="1" fill="#123A5C"/>
    <rect x="62" y="68" width="48" height="2" rx="1" fill="#7BA8C8"/>
    <rect x="62" y="75" width="52" height="2" rx="1" fill="#7BA8C8"/>
    <rect x="62" y="82" width="36" height="2" rx="1" fill="#7BA8C8"/>
    <rect x="62" y="90" width="30" height="4" rx="2" fill="#1E7AC4"/>

    <rect x="12" y="108" width="111" height="50" rx="4" fill="white" fill-opacity="0.92"/>
    <rect x="18" y="114" width="40" height="38" rx="3" fill="#3FA1DD" fill-opacity="0.55"/>
    <rect x="62" y="116" width="56" height="3" rx="1" fill="#123A5C"/>
    <rect x="62" y="124" width="48" height="2" rx="1" fill="#7BA8C8"/>
    <rect x="62" y="131" width="52" height="2" rx="1" fill="#7BA8C8"/>
    <rect x="62" y="138" width="36" height="2" rx="1" fill="#7BA8C8"/>
    <rect x="62" y="146" width="30" height="4" rx="2" fill="#1E7AC4"/>

    <!-- Live indicator -->
    <circle cx="20" cy="172" r="3" fill="#4ADE80"/>
    <rect x="28" y="170" width="40" height="3" rx="1" fill="#123A5C"/>
    <rect x="28" y="176" width="30" height="2" rx="1" fill="#7BA8C8"/>

    <rect x="50" y="200" width="35" height="2.5" rx="1.2" fill="#123A5C"/>
  </g>

  <!-- Signal waves near phone -->
  <g fill="none" stroke="#1E7AC4" stroke-width="2" stroke-linecap="round">
    <path d="M 420 55 A 16 16 0 0 1 436 71"/>
    <path d="M 420 63 A 8 8 0 0 1 428 71"/>
  </g>
  <circle cx="420" cy="71" r="1.8" fill="#1E7AC4"/>

  <!-- Title -->
  <text x="240" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#123A5C" text-anchor="middle">WordPress Plugin &amp; REST API</text>
</svg>
