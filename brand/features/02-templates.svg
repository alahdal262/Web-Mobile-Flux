<svg width="480" height="320" viewBox="0 0 480 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tpl-bg" x1="0" y1="0" x2="480" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F4FAFD"/>
      <stop offset="100%" stop-color="#DBE9F4"/>
    </linearGradient>
    <linearGradient id="tpl-news" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E7AC4"/>
      <stop offset="100%" stop-color="#135785"/>
    </linearGradient>
    <linearGradient id="tpl-shop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3FA1DD"/>
      <stop offset="100%" stop-color="#1E7AC4"/>
    </linearGradient>
    <linearGradient id="tpl-food" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6DC3ED"/>
      <stop offset="100%" stop-color="#3FA1DD"/>
    </linearGradient>
    <linearGradient id="tpl-blog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D8FC9"/>
      <stop offset="100%" stop-color="#145785"/>
    </linearGradient>
    <linearGradient id="tpl-portfolio" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FB1E1"/>
      <stop offset="100%" stop-color="#1E7AC4"/>
    </linearGradient>
    <linearGradient id="tpl-media" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8BD0F0"/>
      <stop offset="100%" stop-color="#2D8FC9"/>
    </linearGradient>
    <filter id="tpl-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#123A5C" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="320" rx="16" fill="url(#tpl-bg)"/>

  <!-- Mini phone template 1 - News -->
  <g transform="translate(40 50)" filter="url(#tpl-shadow)">
    <rect x="0" y="0" width="80" height="150" rx="12" fill="#123A5C"/>
    <rect x="3" y="3" width="74" height="144" rx="9" fill="url(#tpl-news)"/>
    <rect x="8" y="10" width="64" height="4" rx="1.5" fill="#FFFFFF"/>
    <rect x="8" y="18" width="40" height="2.5" rx="1" fill="#FFFFFF" fill-opacity="0.6"/>
    <rect x="8" y="28" width="64" height="30" rx="3" fill="#FFFFFF" fill-opacity="0.18"/>
    <rect x="8" y="62" width="64" height="10" rx="2" fill="#FFFFFF" fill-opacity="0.25"/>
    <rect x="8" y="76" width="64" height="10" rx="2" fill="#FFFFFF" fill-opacity="0.25"/>
    <rect x="8" y="90" width="64" height="10" rx="2" fill="#FFFFFF" fill-opacity="0.25"/>
    <rect x="8" y="104" width="40" height="10" rx="2" fill="#FFFFFF" fill-opacity="0.25"/>
    <text x="40" y="132" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle">NEWS</text>
  </g>

  <!-- Mini phone template 2 - Shop -->
  <g transform="translate(140 30)" filter="url(#tpl-shadow)">
    <rect x="0" y="0" width="80" height="150" rx="12" fill="#123A5C"/>
    <rect x="3" y="3" width="74" height="144" rx="9" fill="url(#tpl-shop)"/>
    <rect x="8" y="10" width="64" height="4" rx="1.5" fill="#FFFFFF"/>
    <rect x="8" y="22" width="28" height="28" rx="3" fill="#FFFFFF" fill-opacity="0.25"/>
    <rect x="40" y="22" width="28" height="28" rx="3" fill="#FFFFFF" fill-opacity="0.25"/>
    <rect x="8" y="54" width="28" height="28" rx="3" fill="#FFFFFF" fill-opacity="0.25"/>
    <rect x="40" y="54" width="28" height="28" rx="3" fill="#FFFFFF" fill-opacity="0.25"/>
    <rect x="8" y="90" width="64" height="8" rx="2" fill="#FFFFFF" fill-opacity="0.35"/>
    <rect x="8" y="102" width="50" height="6" rx="2" fill="#FFFFFF" fill-opacity="0.25"/>
    <text x="40" y="132" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle">SHOP</text>
  </g>

  <!-- Mini phone template 3 - Food -->
  <g transform="translate(240 50)" filter="url(#tpl-shadow)">
    <rect x="0" y="0" width="80" height="150" rx="12" fill="#123A5C"/>
    <rect x="3" y="3" width="74" height="144" rx="9" fill="url(#tpl-food)"/>
    <rect x="8" y="10" width="64" height="18" rx="3" fill="#FFFFFF" fill-opacity="0.35"/>
    <rect x="8" y="34" width="64" height="24" rx="3" fill="#FFFFFF" fill-opacity="0.25"/>
    <circle cx="20" cy="46" r="6" fill="#FFFFFF" fill-opacity="0.55"/>
    <rect x="30" y="40" width="38" height="3" rx="1" fill="#FFFFFF"/>
    <rect x="30" y="47" width="30" height="2" rx="1" fill="#FFFFFF" fill-opacity="0.7"/>
    <rect x="8" y="64" width="64" height="24" rx="3" fill="#FFFFFF" fill-opacity="0.25"/>
    <circle cx="20" cy="76" r="6" fill="#FFFFFF" fill-opacity="0.55"/>
    <rect x="30" y="70" width="38" height="3" rx="1" fill="#FFFFFF"/>
    <rect x="30" y="77" width="30" height="2" rx="1" fill="#FFFFFF" fill-opacity="0.7"/>
    <rect x="8" y="94" width="64" height="14" rx="3" fill="#FFFFFF" fill-opacity="0.35"/>
    <text x="40" y="132" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle">FOOD</text>
  </g>

  <!-- Mini phone template 4 - Blog -->
  <g transform="translate(340 30)" filter="url(#tpl-shadow)">
    <rect x="0" y="0" width="80" height="150" rx="12" fill="#123A5C"/>
    <rect x="3" y="3" width="74" height="144" rx="9" fill="url(#tpl-blog)"/>
    <circle cx="40" cy="22" r="8" fill="#FFFFFF" fill-opacity="0.45"/>
    <rect x="8" y="36" width="64" height="3" rx="1" fill="#FFFFFF"/>
    <rect x="16" y="42" width="48" height="2" rx="1" fill="#FFFFFF" fill-opacity="0.65"/>
    <rect x="8" y="52" width="64" height="22" rx="3" fill="#FFFFFF" fill-opacity="0.2"/>
    <rect x="8" y="80" width="64" height="22" rx="3" fill="#FFFFFF" fill-opacity="0.2"/>
    <rect x="8" y="108" width="64" height="8" rx="2" fill="#FFFFFF" fill-opacity="0.35"/>
    <text x="40" y="132" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle">BLOG</text>
  </g>

  <!-- Bottom row -->
  <g transform="translate(90 175)" filter="url(#tpl-shadow)">
    <rect x="0" y="0" width="80" height="100" rx="10" fill="#123A5C"/>
    <rect x="3" y="3" width="74" height="94" rx="8" fill="url(#tpl-portfolio)"/>
    <rect x="8" y="10" width="64" height="25" rx="3" fill="#FFFFFF" fill-opacity="0.35"/>
    <rect x="8" y="38" width="30" height="25" rx="3" fill="#FFFFFF" fill-opacity="0.25"/>
    <rect x="42" y="38" width="30" height="25" rx="3" fill="#FFFFFF" fill-opacity="0.25"/>
    <text x="40" y="82" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle">PORTFOLIO</text>
  </g>

  <g transform="translate(200 185)" filter="url(#tpl-shadow)">
    <rect x="0" y="0" width="80" height="100" rx="10" fill="#123A5C"/>
    <rect x="3" y="3" width="74" height="94" rx="8" fill="url(#tpl-media)"/>
    <circle cx="40" cy="30" r="14" fill="#FFFFFF" fill-opacity="0.35"/>
    <path d="M 36 24 L 36 36 L 48 30 Z" fill="#FFFFFF"/>
    <rect x="8" y="50" width="64" height="3" rx="1" fill="#FFFFFF"/>
    <rect x="8" y="58" width="48" height="2" rx="1" fill="#FFFFFF" fill-opacity="0.65"/>
    <rect x="8" y="68" width="64" height="8" rx="2" fill="#FFFFFF" fill-opacity="0.3"/>
    <text x="40" y="90" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#FFFFFF" text-anchor="middle">MEDIA</text>
  </g>

  <g transform="translate(310 175)" filter="url(#tpl-shadow)">
    <rect x="0" y="0" width="80" height="100" rx="10" fill="#123A5C"/>
    <rect x="3" y="3" width="74" height="94" rx="8" fill="url(#tpl-news)"/>
    <rect x="8" y="10" width="40" height="4" rx="1" fill="#FFFFFF"/>
    <rect x="8" y="18" width="30" height="2" rx="1" fill="#FFFFFF" fill-opacity="0.6"/>
    <rect x="8" y="28" width="64" height="16" rx="3" fill="#FFFFFF" fill-opacity="0.25"/>
    <rect x="8" y="48" width="64" height="16" rx="3" fill="#FFFFFF" fill-opacity="0.25"/>
    <text x="40" y="82" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#FFFFFF" text-anchor="middle">BUSINESS</text>
  </g>

  <!-- "25" badge -->
  <g transform="translate(390 50)">
    <circle cx="30" cy="30" r="32" fill="#1E7AC4"/>
    <circle cx="30" cy="30" r="28" fill="#FFFFFF"/>
    <text x="30" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="900" fill="#1E7AC4" text-anchor="middle">25</text>
    <text x="30" y="46" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#1E7AC4" text-anchor="middle">TEMPLATES</text>
  </g>

  <!-- Title -->
  <text x="240" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#123A5C" text-anchor="middle">25 Business Templates</text>
</svg>
