<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mwTile" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F4FAFD"/>
      <stop offset="100%" stop-color="#DBE9F4"/>
    </linearGradient>
    <linearGradient id="mwPhone" x1="50" y1="20" x2="130" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6DC3ED"/>
      <stop offset="50%" stop-color="#3FA1DD"/>
      <stop offset="100%" stop-color="#1E7AC4"/>
    </linearGradient>
    <linearGradient id="mwWCircle" x1="68" y1="73" x2="112" y2="117" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2D8FC9"/>
      <stop offset="100%" stop-color="#135785"/>
    </linearGradient>
    <linearGradient id="mwShine" x1="0" y1="20" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Brand tile -->
  <rect width="180" height="180" rx="36" fill="url(#mwTile)"/>

  <!-- Phone outer frame (dark navy bezel) -->
  <rect x="46" y="20" width="88" height="140" rx="17" fill="#123A5C"/>

  <!-- Phone body -->
  <rect x="51" y="25" width="78" height="130" rx="13" fill="url(#mwPhone)"/>

  <!-- Glassy screen shine -->
  <rect x="51" y="25" width="78" height="130" rx="13" fill="url(#mwShine)"/>

  <!-- Earpiece / speaker -->
  <rect x="81" y="32" width="18" height="2.4" rx="1.2" fill="#123A5C"/>

  <!-- WordPress circle -->
  <circle cx="90" cy="95" r="23" fill="white"/>
  <circle cx="90" cy="95" r="20.5" fill="url(#mwWCircle)"/>

  <!-- Stylised W letter -->
  <path d="M 76 82 L 85 110 L 90 88 L 95 110 L 104 82"
        stroke="white"
        stroke-width="4.2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Signal / connectivity waves (top-right) -->
  <g fill="none" stroke="#123A5C" stroke-width="2.6" stroke-linecap="round">
    <path d="M 134 22 A 20 20 0 0 1 154 42"/>
    <path d="M 134 32 A 10 10 0 0 1 144 42"/>
  </g>
  <circle cx="134" cy="42" r="2.2" fill="#123A5C"/>

  <!-- Home indicator -->
  <rect x="80" y="146" width="20" height="3" rx="1.5" fill="#123A5C"/>
</svg>
